<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMF Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0A2947;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #0d3459;
    border: 1px solid #1a4d73;
    border-radius: 20px;
    padding: 36px 40px;
    max-width: 560px;
    width: 100%;
    box-shadow: 0 4px 40px rgba(0,0,0,0.4);
  }
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { font-size: 26px; color: #F3E4C9; font-weight: 700; }
  .formula-box {
    background: #F3E4C9;
    border-radius: 12px;
    padding: 16px; text-align: center;
    margin-bottom: 28px; font-size: 26px;
    font-weight: 700; color: #0A2947; letter-spacing: 2px;
  }
  .slider-group { margin-bottom: 18px; }
  .slider-label {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 6px;
  }
  .slider-label span:first-child { font-size: 14px; color: #c8b99a; font-weight: 500; }
  .slider-label .val {
    font-size: 14px; font-weight: 700;
    color: #F3E4C9; min-width: 70px; text-align: right;
  }
  input[type=range] {
    width: 100%; height: 6px; border-radius: 3px;
    -webkit-appearance: none;
    background: linear-gradient(to right, #F3E4C9 50%, #1a4d73 50%);
    outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px;
    border-radius: 50%; background: #F3E4C9;
    border: 3px solid #0A2947;
    box-shadow: 0 1px 6px rgba(0,0,0,0.4);
  }
  .angle-visual {
    background: #0A2947;
    border: 1px solid #1a4d73;
    border-radius: 14px;
    margin: 12px 0 20px; width: 100%; height: 200px;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .result-box {
    background: #F3E4C9;
    border-radius: 14px; padding: 20px;
    text-align: center; margin-top: 10px;
  }
  .result-box .label { font-size: 13px; color: #6b5a3e; margin-bottom: 6px; }
  .result-box .value { font-size: 42px; font-weight: 700; letter-spacing: 1px; color: #0A2947; }
  .result-box .unit  { font-size: 18px; color: #4a3d28; }
  .divider { border: none; border-top: 1px solid #1a4d73; margin: 22px 0; }
  .badge-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
  .badge { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .badge-cream  { background: #1a4d73; color: #F3E4C9; }
  .badge-light  { background: #e8d5b0; color: #0A2947; }
  .badge-red    { background: #3d1a1a; color: #f5a0a0; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>คำนวณแรงเคลื่อนไฟฟ้าเหนี่ยวนำ</h1>
  </div>

  <div class="formula-box">e = BLv sinθ</div>

  <div class="slider-group">
    <div class="slider-label">
      <span>B — ความเข้มสนามแม่เหล็ก</span>
      <span class="val" id="valB">2.0 T</span>
    </div>
    <input type="range" id="slB" min="0.1" max="5" step="0.1" value="2" oninput="update()">
  </div>
  <div class="slider-group">
    <div class="slider-label">
      <span>L — ความยาวลวด</span>
      <span class="val" id="valL">0.5 m</span>
    </div>
    <input type="range" id="slL" min="0.1" max="2" step="0.1" value="0.5" oninput="update()">
  </div>
  <div class="slider-group">
    <div class="slider-label">
      <span>v — ความเร็วลวด</span>
      <span class="val" id="valV">4 m/s</span>
    </div>
    <input type="range" id="slV" min="1" max="20" step="1" value="4" oninput="update()">
  </div>

  <div class="slider-group">
    <div class="slider-label">
      <span>θ — มุมระหว่าง v กับสนาม B</span>
      <span class="val" id="valTheta">90°</span>
    </div>
    <input type="range" id="slTheta" min="0" max="90" step="1" value="90" oninput="update()">

    <div class="angle-visual">
      <svg width="460" height="185" viewBox="0 0 460 185">
        <defs>
          <marker id="mP" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
            <path d="M0,0.5 L0,5.5 L6,3 z" fill="#534AB7"/>
          </marker>
          <marker id="mG" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
            <path d="M0,0.5 L0,5.5 L6,3 z" fill="#1D9E75"/>
          </marker>
        </defs>

        <!-- เส้นประแนวอ้างอิง -->
        <line x1="80" y1="130" x2="340" y2="130"
              stroke="#1a4d73" stroke-width="1" stroke-dasharray="5 4"/>

        <!-- ลูกศร B (เขียว) -->
        <line id="lineB" x1="200" y1="130" x2="320" y2="130"
              stroke="#1D9E75" stroke-width="3" marker-end="url(#mG)"/>
        <text x="330" y="135" font-size="16" font-weight="700"
              fill="#1D9E75" font-family="Arial">B</text>

        <!-- ลูกศรลวด (ม่วง) -->
        <line id="lineWire" x1="200" y1="130" x2="200" y2="48"
              stroke="#534AB7" stroke-width="3" marker-end="url(#mP)"/>

        <!-- label v -->
        <text id="lblWire" x="208" y="44" font-size="13" font-weight="700"
              fill="#F3E4C9" font-family="Arial">v</text>

        <!-- arc มุม θ -->
        <path id="arcT" d="" fill="none"
              stroke="#F3E4C9" stroke-width="1.5" stroke-dasharray="3 2"/>

        <!-- label θ -->
        <text id="lblTheta" x="240" y="115" font-size="13" font-weight="700"
              fill="#F3E4C9" font-family="Arial">θ = 90°</text>

        <!-- legend -->
        <line x1="14" y1="14" x2="36" y2="14" stroke="#534AB7" stroke-width="2.5" marker-end="url(#mP)"/>
        <text x="42" y="19" font-size="11" fill="#F3E4C9" font-family="Arial">ลวด (v)</text>
        <line x1="14" y1="32" x2="36" y2="32" stroke="#1D9E75" stroke-width="2.5" marker-end="url(#mG)"/>
        <text x="42" y="37" font-size="11" fill="#F3E4C9" font-family="Arial">สนาม B</text>
      </svg>
    </div>
  </div>

  <div class="result-box">
    <div class="label">แรงเคลื่อนไฟฟ้าเหนี่ยวนำ e</div>
    <div><span class="value" id="resultVal">4.00</span> <span class="unit">V</span></div>
  </div>

  <hr class="divider">
  <div class="badge-row">
    <span class="badge badge-cream" id="badgeAngle">ตั้งฉากกับ B</span>
    <span class="badge badge-light" id="badgeEMF">e สูงสุด = BLv</span>
  </div>
</div>

<script>
const OX = 200, OY = 130;
const LEN_W = 90;
const ARC_R = 36;

function update() {
  const B  = parseFloat(document.getElementById('slB').value);
  const L  = parseFloat(document.getElementById('slL').value);
  const v  = parseFloat(document.getElementById('slV').value);
  const th = parseFloat(document.getElementById('slTheta').value);

  document.getElementById('valB').textContent     = B.toFixed(1) + ' T';
  document.getElementById('valL').textContent     = L.toFixed(1) + ' m';
  document.getElementById('valV').textContent     = v.toFixed(0) + ' m/s';
  document.getElementById('valTheta').textContent = th.toFixed(0) + '°';

  const e = B * L * v * Math.sin(th * Math.PI / 180);
  document.getElementById('resultVal').textContent = e.toFixed(2);

  const rad = th * Math.PI / 180;
  const wx = OX + LEN_W * Math.cos(rad);
  const wy = OY - LEN_W * Math.sin(rad);

  const wire = document.getElementById('lineWire');
  wire.setAttribute('x2', wx.toFixed(1));
  wire.setAttribute('y2', wy.toFixed(1));

  const lw = document.getElementById('lblWire');
  const lx = OX + (LEN_W + 14) * Math.cos(rad);
  const ly = OY - (LEN_W + 14) * Math.sin(rad);
  lw.setAttribute('x', (lx - 5).toFixed(1));
  lw.setAttribute('y', (ly + 5).toFixed(1));

  if (th > 1) {
    const ax1 = OX + ARC_R, ay1 = OY;
    const ax2 = OX + ARC_R * Math.cos(rad);
    const ay2 = OY - ARC_R * Math.sin(rad);
    document.getElementById('arcT').setAttribute('d',
      `M${ax1.toFixed(1)},${ay1.toFixed(1)} A${ARC_R},${ARC_R} 0 0,0 ${ax2.toFixed(1)},${ay2.toFixed(1)}`);
  } else {
    document.getElementById('arcT').setAttribute('d', '');
  }

  const midRad = rad / 2;
  const tlx = OX + (ARC_R + 20) * Math.cos(midRad);
  const tly = OY - (ARC_R + 20) * Math.sin(midRad);
  const tl = document.getElementById('lblTheta');
  tl.setAttribute('x', tlx.toFixed(1));
  tl.setAttribute('y', tly.toFixed(1));
  tl.textContent = 'θ = ' + th.toFixed(0) + '°';

  ['slB','slL','slV','slTheta'].forEach(id => {
    const el = document.getElementById(id);
    const pct = ((el.value - el.min) / (el.max - el.min) * 100).toFixed(1);
    el.style.background = `linear-gradient(to right,#F3E4C9 ${pct}%,#1a4d73 ${pct}%)`;
  });

  const ba = document.getElementById('badgeAngle');
  const be = document.getElementById('badgeEMF');
  if (th === 90) {
    ba.textContent = 'ตั้งฉากกับ B';   ba.className = 'badge badge-cream';
    be.textContent = 'e สูงสุด = BLv'; be.className = 'badge badge-light';
  } else if (th === 0) {
    ba.textContent = 'ขนานกับ B'; ba.className = 'badge badge-red';
    be.textContent = 'e = 0';     be.className = 'badge badge-red';
  } else {
    ba.textContent = 'θ = ' + th + '°';            ba.className = 'badge badge-cream';
    be.textContent = 'e = ' + e.toFixed(2) + ' V'; be.className = 'badge badge-light';
  }
}
update();
</script>
</body>
</html>
